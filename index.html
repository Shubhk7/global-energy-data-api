<!DOCTYPE html>
<html>
<head>
  <title>Global Energy API</title>
</head>
<body>

<h1>Global Energy Data API</h1>
<ul id="list"></ul>

<script>
fetch("metadata/index.json")
  .then(res => res.json())
  .then(data => {
    const list = document.getElementById("list");

    data.datasets.forEach(ds => {
      const li = document.createElement("li");

      const url = data.base_urls.primary + ds.path;

      li.innerHTML = `<a href="${url}" target="_blank">${ds.name}</a>`;
      list.appendChild(li);
    });
  });
</script>

</body>
</html>
